<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>터렛 디펜스</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0a0c10;
    --panel: #0f1318;
    --border: #1e2a3a;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --green: #39ff14;
    --red: #ff2244;
    --gold: #ffd700;
    --text: #c8d8e8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(0,212,255,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(255,107,53,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(18px, 4vw, 28px);
    font-weight: 900;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,212,255,0.6), 0 0 40px rgba(0,212,255,0.2);
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
  }

  .hud {
    display: flex;
    gap: 20px;
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
    flex-wrap: wrap;
    justify-content: center;
  }
  .hud-item {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 14px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    position: relative;
    overflow: hidden;
  }
  .hud-item::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }
  .hud-label { color: #5a7a9a; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; }
  .hud-value { color: var(--accent); font-weight: 700; font-size: 16px; font-family: 'Orbitron', monospace; }
  .hud-value.gold { color: var(--gold); }
  .hud-value.red  { color: var(--red); }
  .hud-value.green { color: var(--green); }

  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    position: relative;
    z-index: 1;
  }
  .level-ctrl {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 10px;
  }
  .level-ctrl span { font-size: 11px; color: #5a7a9a; text-transform: uppercase; letter-spacing: 0.08em; }
  .level-val { color: var(--accent2); font-family: 'Orbitron', monospace; font-weight: 700; font-size: 18px; min-width: 30px; text-align: center; }

  button {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  button:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 10px rgba(0,212,255,0.15); }
  button.arrow { padding: 4px 10px; font-size: 16px; }
  button.start-btn {
    background: linear-gradient(135deg, #004466, #002233);
    border-color: var(--accent);
    color: var(--accent);
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    padding: 8px 20px;
    box-shadow: 0 0 15px rgba(0,212,255,0.2);
  }
  button.start-btn:hover { background: linear-gradient(135deg, #005588, #003344); box-shadow: 0 0 25px rgba(0,212,255,0.4); }
  button.reset-btn { border-color: var(--red); color: var(--red); }
  button.reset-btn:hover { box-shadow: 0 0 10px rgba(255,34,68,0.2); }

  .game-area { position: relative; z-index: 1; }

  canvas {
    display: block;
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 0 30px rgba(0,212,255,0.08), inset 0 0 60px rgba(0,0,0,0.5);
    cursor: crosshair;
  }

  .info-bar {
    margin-top: 10px;
    font-size: 11px;
    color: #3a5a7a;
    letter-spacing: 0.05em;
    position: relative;
    z-index: 1;
  }

  .game-over-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .game-over-overlay.show { display: flex; }
  .game-over-box {
    background: var(--panel);
    border: 2px solid var(--red);
    border-radius: 8px;
    padding: 40px 60px;
    text-align: center;
    box-shadow: 0 0 60px rgba(255,34,68,0.3);
  }
  .game-over-title {
    font-family: 'Orbitron', monospace;
    font-size: 32px;
    font-weight: 900;
    color: var(--red);
    text-shadow: 0 0 20px rgba(255,34,68,0.6);
    margin-bottom: 12px;
  }
  .game-over-sub  { color: #5a7a9a; margin-bottom: 24px; font-size: 14px; }
  .game-over-stat { color: var(--text); font-size: 13px; margin-bottom: 6px; }
  .game-over-stat span { color: var(--gold); font-family: 'Orbitron', monospace; }
</style>
</head>
<body>

<h1>⚡ TURRET DEFENSE</h1>

<div class="hud">
  <div class="hud-item">
    <div><div class="hud-label">Gold</div><div class="hud-value gold" id="goldDisplay">1</div></div>
  </div>
  <div class="hud-item">
    <div><div class="hud-label">Monsters</div><div class="hud-value red" id="monsterCount">0</div></div>
  </div>
  <div class="hud-item">
    <div><div class="hud-label">Killed</div><div class="hud-value green" id="killCount">0</div></div>
  </div>
  <div class="hud-item">
    <div><div class="hud-label">Spawned</div><div class="hud-value" id="waveDisplay">0</div></div>
  </div>
</div>

<div class="controls">
  <div class="level-ctrl">
    <span>Lv</span>
    <button class="arrow" id="lvDown">▼</button>
    <div class="level-val" id="levelDisplay">1</div>
    <button class="arrow" id="lvUp">▲</button>
  </div>
  <button class="start-btn" id="startBtn">▶ START</button>
  <button class="reset-btn" id="resetBtn">↺ RESET</button>
</div>

<div class="game-area">
  <canvas id="gameCanvas"></canvas>
</div>
<div class="info-bar" id="infoBar">그리드 클릭 → 터렛 설치 (비용: 1골드) | 터렛 재클릭 → 철거 (50% 환불)</div>

<div class="game-over-overlay" id="gameOverOverlay">
  <div class="game-over-box">
    <div class="game-over-title">GAME OVER</div>
    <div class="game-over-sub">몬스터 100마리 누적</div>
    <div class="game-over-stat">처치한 몬스터: <span id="finalKills">0</span></div>
    <div class="game-over-stat">획득한 골드: <span id="finalGold">0</span></div>
    <div class="game-over-stat">설치한 터렛: <span id="finalTurrets">0</span></div>
    <br>
    <button class="reset-btn" onclick="resetGame()" style="font-size:14px;padding:10px 28px;">↺ RESTART</button>
  </div>
</div>

<!--
  로드 순서 중요:
  1. config  → 상수 정의
  2. state   → 상태 변수 (config 참조)
  3. path    → 경로 데이터 (config 참조)
  4. monster → 몬스터 로직 (path, state 참조)
  5. turret  → 터렛 로직 (monster, state 참조)
  6. bullet  → 총알 로직 (monster, state 참조)
  7. render  → 렌더링 (모두 참조)
  8. game    → 게임 루프 & 컨트롤 (모두 참조)
-->
<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/path.js"></script>
<script src="js/monster.js"></script>
<script src="js/turret.js"></script>
<script src="js/bullet.js"></script>
<script src="js/render.js"></script>
<script src="js/game.js"></script>

</body>
</html>
