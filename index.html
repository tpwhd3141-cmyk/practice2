<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>터렛 디펜스</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0a0c10;
    --panel: #0f1318;
    --border: #1e2a3a;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --green: #39ff14;
    --red: #ff2244;
    --gold: #ffd700;
    --text: #c8d8e8;
    --grid-bg: #0d1520;
    --path-bg: #141e2e;
    --turret-color: #00d4ff;
    --monster-color: #ff4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(0,212,255,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(255,107,53,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(18px, 4vw, 28px);
    font-weight: 900;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,212,255,0.6), 0 0 40px rgba(0,212,255,0.2);
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
  }

  .hud {
    display: flex;
    gap: 20px;
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
    flex-wrap: wrap;
    justify-content: center;
  }

  .hud-item {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 14px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    position: relative;
    overflow: hidden;
  }
  .hud-item::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }
  .hud-label { color: #5a7a9a; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; }
  .hud-value { color: var(--accent); font-weight: 700; font-size: 16px; font-family: 'Orbitron', monospace; }
  .hud-value.gold { color: var(--gold); }
  .hud-value.red { color: var(--red); }
  .hud-value.green { color: var(--green); }

  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .level-ctrl {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 10px;
  }
  .level-ctrl span { font-size: 11px; color: #5a7a9a; text-transform: uppercase; letter-spacing: 0.08em; }
  .level-val { color: var(--accent2); font-family: 'Orbitron', monospace; font-weight: 700; font-size: 18px; min-width: 30px; text-align: center; }

  button {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  button:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 10px rgba(0,212,255,0.15); }
  button.arrow { padding: 4px 10px; font-size: 16px; }
  button.start-btn {
    background: linear-gradient(135deg, #004466, #002233);
    border-color: var(--accent);
    color: var(--accent);
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    padding: 8px 20px;
    box-shadow: 0 0 15px rgba(0,212,255,0.2);
  }
  button.start-btn:hover { background: linear-gradient(135deg, #005588, #003344); box-shadow: 0 0 25px rgba(0,212,255,0.4); }
  button.reset-btn { border-color: var(--red); color: var(--red); }
  button.reset-btn:hover { box-shadow: 0 0 10px rgba(255,34,68,0.2); }

  .game-area {
    position: relative;
    z-index: 1;
  }

  canvas {
    display: block;
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 0 30px rgba(0,212,255,0.08), inset 0 0 60px rgba(0,0,0,0.5);
    cursor: crosshair;
  }

  .info-bar {
    margin-top: 10px;
    font-size: 11px;
    color: #3a5a7a;
    letter-spacing: 0.05em;
    position: relative;
    z-index: 1;
  }

  .game-over-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    display: none;
  }
  .game-over-overlay.show { display: flex; }
  .game-over-box {
    background: var(--panel);
    border: 2px solid var(--red);
    border-radius: 8px;
    padding: 40px 60px;
    text-align: center;
    box-shadow: 0 0 60px rgba(255,34,68,0.3);
  }
  .game-over-title {
    font-family: 'Orbitron', monospace;
    font-size: 32px;
    font-weight: 900;
    color: var(--red);
    text-shadow: 0 0 20px rgba(255,34,68,0.6);
    margin-bottom: 12px;
  }
  .game-over-sub { color: #5a7a9a; margin-bottom: 24px; font-size: 14px; }
  .game-over-stat { color: var(--text); font-size: 13px; margin-bottom: 6px; }
  .game-over-stat span { color: var(--gold); font-family: 'Orbitron', monospace; }
</style>
</head>
<body>

<h1>⚡ TURRET DEFENSE</h1>

<div class="hud">
  <div class="hud-item">
    <div><div class="hud-label">Gold</div><div class="hud-value gold" id="goldDisplay">1</div></div>
  </div>
  <div class="hud-item">
    <div><div class="hud-label">Monsters</div><div class="hud-value red" id="monsterCount">0</div></div>
  </div>
  <div class="hud-item">
    <div><div class="hud-label">Killed</div><div class="hud-value green" id="killCount">0</div></div>
  </div>
  <div class="hud-item">
    <div><div class="hud-label">Wave</div><div class="hud-value" id="waveDisplay">—</div></div>
  </div>
</div>

<div class="controls">
  <div class="level-ctrl">
    <span>Lv</span>
    <button class="arrow" id="lvDown">▼</button>
    <div class="level-val" id="levelDisplay">1</div>
    <button class="arrow" id="lvUp">▲</button>
  </div>
  <button class="start-btn" id="startBtn">▶ START</button>
  <button class="reset-btn" id="resetBtn">↺ RESET</button>
</div>

<div class="game-area">
  <canvas id="gameCanvas"></canvas>
</div>
<div class="info-bar" id="infoBar">그리드 클릭 → 터렛 설치 (비용: 1골드) | 터렛 재클릭 → 철거 (50% 환불)</div>

<div class="game-over-overlay" id="gameOverOverlay">
  <div class="game-over-box">
    <div class="game-over-title">GAME OVER</div>
    <div class="game-over-sub">몬스터 100마리 누적</div>
    <div class="game-over-stat">처치한 몬스터: <span id="finalKills">0</span></div>
    <div class="game-over-stat">획득한 골드: <span id="finalGold">0</span></div>
    <div class="game-over-stat">설치한 터렛: <span id="finalTurrets">0</span></div>
    <br>
    <button class="reset-btn" onclick="resetGame()" style="font-size:14px;padding:10px 28px;">↺ RESTART</button>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const GRID = 5;
const CELL = 56;
const PATH_W = 48;
const OUTER = 2; // outer ring thickness (cells)
const PADDING = 20;
const TURRET_RANGE = CELL * 2.2;
const TURRET_FIRE_RATE = 60; // frames
const BULLET_SPEED = 5;
const SPAWN_INTERVAL = 90; // frames between spawns
const MAX_MONSTERS = 100;
const TURRET_COST = 1;
const START_GOLD = 1;

// Canvas sizing
const TOTAL = GRID + OUTER * 2; // 9x9 logical grid
const W = TOTAL * CELL + PADDING * 2;
const H = TOTAL * CELL + PADDING * 2;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = W;
canvas.height = H;

// ─── PATH DEFINITION ──────────────────────────────────────
// Outer ring path in cell coords (col, row) — 0-indexed in the 9x9 grid
// Path goes clockwise: start at top-left corner going right
function buildPath() {
  const pts = [];
  const minC = 0, maxC = TOTAL - 1;
  // Top row left→right
  for (let c = minC; c <= maxC; c++) pts.push([c, minC]);
  // Right col top→bottom (skip corner)
  for (let r = minC + 1; r <= maxC; r++) pts.push([maxC, r]);
  // Bottom row right→left (skip corner)
  for (let c = maxC - 1; c >= minC; c--) pts.push([c, maxC]);
  // Left col bottom→top (skip corners)
  for (let r = maxC - 1; r >= minC + 1; r--) pts.push([minC, r]);
  return pts;
}
const PATH_CELLS = buildPath();

// Convert path cell to canvas center px
function cellToCanvas(col, row) {
  return {
    x: PADDING + col * CELL + CELL / 2,
    y: PADDING + row * CELL + CELL / 2
  };
}

// ─── STATE ────────────────────────────────────────────────
let gold = START_GOLD;
let level = 1;
let turrets = {}; // key: "col,row" → {col, row, cooldown}
let monsters = [];
let bullets = [];
let running = false;
let frame = 0;
let spawnTimer = 0;
let killCount = 0;
let totalGoldEarned = START_GOLD;
let waveNum = 0;
let gameOver = false;
let monstersSpawnedThisWave = 0;
let monstersPerWave = 5;

// ─── MONSTER ──────────────────────────────────────────────
let nextMonsterId = 0;
function spawnMonster() {
  const hp = level;
  monsters.push({
    id: nextMonsterId++,
    pathIdx: 0,
    t: 0, // interpolation 0→1 between pathIdx and pathIdx+1
    hp,
    maxHp: hp,
    speed: 0.008 + level * 0.0003, // fraction of path per frame
    dead: false
  });
}

function getMonsterPos(m) {
  const idx = m.pathIdx % PATH_CELLS.length;
  const next = (m.pathIdx + 1) % PATH_CELLS.length;
  const a = cellToCanvas(...PATH_CELLS[idx]);
  const b = cellToCanvas(...PATH_CELLS[next]);
  return {
    x: a.x + (b.x - a.x) * m.t,
    y: a.y + (b.y - a.y) * m.t
  };
}

// ─── GAME LOOP ────────────────────────────────────────────
let rafId;
function gameLoop() {
  if (!running || gameOver) return;
  frame++;
  update();
  render();
  rafId = requestAnimationFrame(gameLoop);
}

function update() {
  // Spawn
  spawnTimer--;
  if (spawnTimer <= 0) {
    if (monstersSpawnedThisWave < monstersPerWave) {
      spawnMonster();
      monstersSpawnedThisWave++;
      spawnTimer = SPAWN_INTERVAL;
    } else {
      // Check if all spawned monsters are dead → new wave
      if (monsters.every(m => m.dead)) {
        startWave();
        spawnTimer = 60;
      }
    }
  }

  // Move monsters
  monsters.forEach(m => {
    if (m.dead) return;
    m.t += m.speed;
    if (m.t >= 1) {
      m.t -= 1;
      m.pathIdx = (m.pathIdx + 1) % PATH_CELLS.length;
    }
  });

  // Turrets fire
  Object.values(turrets).forEach(t => {
    t.cooldown = (t.cooldown || 0) - 1;
    if (t.cooldown > 0) return;
    // Find nearest monster in range
    const tPos = cellToCanvas(t.col, t.row);
    let target = null, bestDist = Infinity;
    monsters.forEach(m => {
      if (m.dead) return;
      const mPos = getMonsterPos(m);
      const dx = mPos.x - tPos.x, dy = mPos.y - tPos.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < TURRET_RANGE && d < bestDist) { bestDist = d; target = m; }
    });
    if (target) {
      const mPos = getMonsterPos(target);
      const dx = mPos.x - tPos.x, dy = mPos.y - tPos.y;
      const len = Math.sqrt(dx*dx + dy*dy);
      bullets.push({ x: tPos.x, y: tPos.y, vx: dx/len*BULLET_SPEED, vy: dy/len*BULLET_SPEED, targetId: target.id, dmg: 1 });
      t.cooldown = TURRET_FIRE_RATE;
    }
  });

  // Move bullets
  bullets = bullets.filter(b => {
    b.x += b.vx; b.y += b.vy;
    // Off-screen
    if (b.x < 0 || b.x > W || b.y < 0 || b.y > H) return false;
    // Hit target
    const target = monsters.find(m => m.id === b.targetId && !m.dead);
    if (target) {
      const pos = getMonsterPos(target);
      const dx = pos.x - b.x, dy = pos.y - b.y;
      if (Math.sqrt(dx*dx + dy*dy) < 12) {
        target.hp -= b.dmg;
        if (target.hp <= 0) {
          target.dead = true;
          gold += level;
          totalGoldEarned += level;
          killCount++;
          updateHUD();
        }
        return false;
      }
    } else {
      return false; // target gone
    }
    return true;
  });

  // Remove dead monsters
  monsters = monsters.filter(m => !m.dead);

  // Check game over
  if (monsters.length >= MAX_MONSTERS) {
    triggerGameOver();
    return;
  }

  updateHUD();
}

function startWave() {
  waveNum++;
  monstersSpawnedThisWave = 0;
  monstersPerWave = 5 + waveNum * 2;
  document.getElementById('waveDisplay').textContent = waveNum;
}

function updateHUD() {
  document.getElementById('goldDisplay').textContent = gold;
  document.getElementById('monsterCount').textContent = monsters.length;
  document.getElementById('killCount').textContent = killCount;
}

// ─── RENDER ───────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#0a0c10';
  ctx.fillRect(0, 0, W, H);

  // Draw path cells
  PATH_CELLS.forEach(([c, r]) => {
    const x = PADDING + c * CELL, y = PADDING + r * CELL;
    ctx.fillStyle = '#0d1a28';
    ctx.fillRect(x+1, y+1, CELL-2, CELL-2);
    // Path grid lines
    ctx.strokeStyle = '#131f2e';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(x+1, y+1, CELL-2, CELL-2);
  });

  // Directional arrows on path (every 5 cells)
  ctx.fillStyle = 'rgba(0,212,255,0.15)';
  ctx.font = '10px Share Tech Mono';
  PATH_CELLS.forEach(([c, r], i) => {
    if (i % 6 !== 0) return;
    const next = PATH_CELLS[(i+1) % PATH_CELLS.length];
    const dx = next[0] - c, dy = next[1] - r;
    const arrow = dx > 0 ? '→' : dx < 0 ? '←' : dy > 0 ? '↓' : '↑';
    const px = cellToCanvas(c, r);
    ctx.fillText(arrow, px.x - 5, px.y + 4);
  });

  // Spawn marker
  const spawnCell = cellToCanvas(...PATH_CELLS[0]);
  ctx.fillStyle = 'rgba(255,107,53,0.3)';
  ctx.beginPath();
  ctx.arc(spawnCell.x, spawnCell.y, 14, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#ff6b35';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = '#ff6b35';
  ctx.font = 'bold 9px Share Tech Mono';
  ctx.textAlign = 'center';
  ctx.fillText('IN', spawnCell.x, spawnCell.y + 3);
  ctx.textAlign = 'left';

  // Draw inner grid (5×5)
  for (let r = OUTER; r < OUTER + GRID; r++) {
    for (let c = OUTER; c < OUTER + GRID; c++) {
      const x = PADDING + c * CELL, y = PADDING + r * CELL;
      const key = `${c},${r}`;
      if (turrets[key]) {
        // Turret installed
        drawTurret(x, y, turrets[key]);
      } else {
        // Empty cell
        ctx.fillStyle = '#0e1a22';
        ctx.fillRect(x+1, y+1, CELL-2, CELL-2);
        ctx.strokeStyle = '#1a2e3e';
        ctx.lineWidth = 1;
        ctx.strokeRect(x+1, y+1, CELL-2, CELL-2);
        // Plus icon
        ctx.fillStyle = '#1e3040';
        ctx.font = '18px Share Tech Mono';
        ctx.textAlign = 'center';
        ctx.fillText('+', x + CELL/2, y + CELL/2 + 7);
        ctx.textAlign = 'left';
      }
    }
  }

  // Turret range indicators (faint)
  Object.values(turrets).forEach(t => {
    const pos = cellToCanvas(t.col, t.row);
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, TURRET_RANGE, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(0,212,255,0.06)';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // Bullets
  bullets.forEach(b => {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 3, 0, Math.PI*2);
    ctx.fillStyle = '#ffffaa';
    ctx.fill();
    ctx.shadowColor = '#ffff00';
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Monsters
  monsters.forEach(m => {
    const pos = getMonsterPos(m);
    const r = 10;

    // Glow
    ctx.shadowColor = '#ff2244';
    ctx.shadowBlur = 10;

    // Body
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, r, 0, Math.PI*2);
    ctx.fillStyle = '#cc1133';
    ctx.fill();
    ctx.strokeStyle = '#ff4466';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.shadowBlur = 0;

    // HP bar
    const barW = 22, barH = 3;
    const bx = pos.x - barW/2, by = pos.y - r - 7;
    ctx.fillStyle = '#330011';
    ctx.fillRect(bx, by, barW, barH);
    ctx.fillStyle = m.hp / m.maxHp > 0.5 ? '#39ff14' : '#ff6600';
    ctx.fillRect(bx, by, barW * (m.hp / m.maxHp), barH);
  });

  // Monster count warning
  if (monsters.length >= 70) {
    ctx.fillStyle = `rgba(255,34,68,${0.3 + 0.3 * Math.sin(frame * 0.1)})`;
    ctx.font = 'bold 11px Orbitron, monospace';
    ctx.textAlign = 'center';
    ctx.fillText('⚠ OVERFLOW IMMINENT', W/2, H - 8);
    ctx.textAlign = 'left';
  }
}

function drawTurret(x, y, t) {
  const cx = x + CELL/2, cy = y + CELL/2;

  // Base glow
  ctx.shadowColor = '#00d4ff';
  ctx.shadowBlur = 12;

  // Base plate
  ctx.fillStyle = '#0a2030';
  ctx.fillRect(x+2, y+2, CELL-4, CELL-4);

  // Outer ring
  ctx.beginPath();
  ctx.arc(cx, cy, 18, 0, Math.PI*2);
  ctx.strokeStyle = '#00d4ff';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Inner ring
  ctx.beginPath();
  ctx.arc(cx, cy, 10, 0, Math.PI*2);
  ctx.fillStyle = '#003355';
  ctx.fill();
  ctx.strokeStyle = '#00aacc';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Center dot
  ctx.beginPath();
  ctx.arc(cx, cy, 4, 0, Math.PI*2);
  ctx.fillStyle = '#00d4ff';
  ctx.fill();

  ctx.shadowBlur = 0;

  // Cooldown indicator
  const cd = (t.cooldown || 0);
  if (cd > 0) {
    const pct = 1 - cd / TURRET_FIRE_RATE;
    ctx.beginPath();
    ctx.arc(cx, cy, 18, -Math.PI/2, -Math.PI/2 + Math.PI*2*pct);
    ctx.strokeStyle = 'rgba(0,212,255,0.4)';
    ctx.lineWidth = 3;
    ctx.stroke();
  }
}

// ─── CLICK HANDLER ────────────────────────────────────────
canvas.addEventListener('click', e => {
  if (!running || gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);
  const col = Math.floor((mx - PADDING) / CELL);
  const row = Math.floor((my - PADDING) / CELL);

  // Must be in 5×5 inner grid
  if (col < OUTER || col >= OUTER + GRID || row < OUTER || row >= OUTER + GRID) return;

  const key = `${col},${row}`;
  if (turrets[key]) {
    // Demolish: 50% refund
    const refund = Math.floor(TURRET_COST / 2) || 0;
    gold += refund;
    delete turrets[key];
    updateHUD();
  } else {
    // Build
    if (gold < TURRET_COST) {
      document.getElementById('infoBar').textContent = '골드 부족!';
      setTimeout(() => document.getElementById('infoBar').textContent = '그리드 클릭 → 터렛 설치 (비용: 1골드) | 터렛 재클릭 → 철거 (50% 환불)', 1500);
      return;
    }
    gold -= TURRET_COST;
    turrets[key] = { col, row, cooldown: 0 };
    updateHUD();
  }
  render();
});

// ─── CONTROLS ─────────────────────────────────────────────
document.getElementById('lvUp').addEventListener('click', () => {
  level++;
  document.getElementById('levelDisplay').textContent = level;
});
document.getElementById('lvDown').addEventListener('click', () => {
  if (level > 1) { level--; document.getElementById('levelDisplay').textContent = level; }
});
document.getElementById('startBtn').addEventListener('click', () => {
  if (running) return;
  running = true;
  document.getElementById('startBtn').textContent = '▶ RUNNING';
  document.getElementById('startBtn').disabled = true;
  startWave();
  spawnTimer = 30;
  gameLoop();
});
document.getElementById('resetBtn').addEventListener('click', resetGame);

function resetGame() {
  cancelAnimationFrame(rafId);
  running = false;
  gameOver = false;
  gold = START_GOLD;
  turrets = {};
  monsters = [];
  bullets = [];
  frame = 0;
  spawnTimer = 0;
  killCount = 0;
  totalGoldEarned = START_GOLD;
  waveNum = 0;
  monstersSpawnedThisWave = 0;
  monstersPerWave = 5;
  nextMonsterId = 0;
  document.getElementById('gameOverOverlay').classList.remove('show');
  document.getElementById('startBtn').textContent = '▶ START';
  document.getElementById('startBtn').disabled = false;
  document.getElementById('waveDisplay').textContent = '—';
  updateHUD();
  render();
}

function triggerGameOver() {
  running = false;
  gameOver = true;
  document.getElementById('finalKills').textContent = killCount;
  document.getElementById('finalGold').textContent = totalGoldEarned;
  document.getElementById('finalTurrets').textContent = Object.keys(turrets).length;
  document.getElementById('gameOverOverlay').classList.add('show');
}

// ─── INIT ─────────────────────────────────────────────────
updateHUD();
render();
</script>
</body>
</html>
