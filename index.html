<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
#game { padding: 1rem; max-width: 480px; margin: 0 auto; font-family: var(--font-sans); }
.bar-wrap { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px; margin-bottom: 12px; }
.bar-label { display: flex; justify-content: space-between; font-size: 13px; color: var(--color-text-secondary); margin-bottom: 6px; }
.bar-track { height: 12px; background: var(--color-background-tertiary); border-radius: 6px; overflow: hidden; border: 0.5px solid var(--color-border-tertiary); }
.bar-fill { height: 100%; border-radius: 6px; transition: width 0.4s ease; }
.love-fill { background: #D4537E; }
.blog-fill { background: #534AB7; }
.dog-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 14px; }
.dog-emoji { font-size: 52px; line-height: 1; }
.dog-info { flex: 1; }
.dog-name { font-size: 16px; font-weight: 500; color: var(--color-text-primary); }
.dog-mood { font-size: 13px; color: var(--color-text-secondary); margin-top: 2px; }
.rebirth-badge { display: inline-block; background: #534AB7; color: #EEEDFE; font-size: 11px; padding: 2px 8px; border-radius: var(--border-radius-md); margin-top: 4px; }
.btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.btn-grid.three { grid-template-columns: 1fr 1fr 1fr; }
.act-btn { background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 10px 8px; cursor: pointer; font-size: 13px; color: var(--color-text-primary); text-align: center; transition: background 0.15s; }
.act-btn:hover { background: var(--color-background-secondary); }
.act-btn:active { transform: scale(0.97); }
.act-btn .btn-icon { font-size: 20px; display: block; margin-bottom: 4px; }
.act-btn .btn-cost { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
.act-btn.earn { border-color: #1D9E75; }
.act-btn.blog-btn { border-color: #534AB7; }
.blog-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 12px; margin-bottom: 12px; }
.blog-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.blog-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
.blog-auto { font-size: 12px; color: #0F6E56; font-weight: 500; }
.blog-progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; }
.blog-sub { font-size: 11px; color: var(--color-text-tertiary); margin-top: 6px; }
.hosp-btn { width: 100%; padding: 14px; background: #D4537E; color: #FBEAF0; border: none; border-radius: var(--border-radius-lg); font-size: 15px; font-weight: 500; cursor: pointer; transition: opacity 0.2s; margin-bottom: 12px; }
.hosp-btn:hover { opacity: 0.88; }
.hosp-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.visit-stat { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 14px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
.visit-stat-val { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
.visit-stat-desc { font-size: 11px; color: var(--color-text-tertiary); margin-top: 1px; }
.log-box { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 14px; font-size: 12px; color: var(--color-text-secondary); line-height: 1.8; min-height: 56px; border: 0.5px solid var(--color-border-tertiary); }
.log-entry { animation: fadeIn 0.3s; }
@keyframes fadeIn { from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);} }
.flash { animation: flash 0.4s; }
@keyframes flash { 0%,100%{transform:scale(1);}50%{transform:scale(1.12);} }
.toast { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); padding: 10px 18px; font-size: 13px; font-weight: 500; color: var(--color-text-primary); z-index: 99; opacity: 0; transition: opacity 0.25s; pointer-events: none; }
.toast.show { opacity: 1; }
.section-title { font-size: 11px; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.lv-up-flash { animation: lvFlash 0.5s; }
@keyframes lvFlash { 0%{background:#EEEDFE;}100%{background:var(--color-background-primary);} }
.blog-auto-pulse { animation: autoPulse 0.6s; }
@keyframes autoPulse { 0%{transform:scale(1);color:#0F6E56;}40%{transform:scale(1.18);color:#1D9E75;}100%{transform:scale(1);color:#0F6E56;} }
.blog-timer-bar { height: 3px; background: var(--color-background-tertiary); border-radius: 2px; overflow: hidden; margin-top: 6px; }
.blog-timer-fill { height: 100%; background: #534AB7; border-radius: 2px; transition: width 0.1s linear; }
.power-blogger-banner { background: linear-gradient(135deg,#534AB7,#D4537E); color: #fff; border-radius: var(--border-radius-md); padding: 10px 14px; margin-top: 8px; font-size: 13px; font-weight: 500; text-align: center; display: none; animation: bannerPop 0.6s cubic-bezier(0.175,0.885,0.32,1.275); }
.power-blogger-banner.show { display: block; }
@keyframes bannerPop { 0%{opacity:0;transform:scale(0.7);}60%{transform:scale(1.08);}100%{opacity:1;transform:scale(1);} }
.confetti-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; overflow: hidden; }
.confetti-piece { position: absolute; width: 8px; height: 8px; border-radius: 2px; animation: confettiFall 2s ease-in forwards; }
@keyframes confettiFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;} }
</style>

<div id="game">
  <h2 class="sr-only">옹심이 병원가기 — 방치형 게임</h2>
  <div id="toast" class="toast"></div>

  <div class="dog-card">
    <div class="dog-emoji" id="dogEmoji">🐶</div>
    <div class="dog-info">
      <div class="dog-name">옹심이</div>
      <div class="dog-mood" id="dogMood">집에서 뒹굴거리는 중...</div>
      <div id="rebirthBadge"></div>
    </div>
    <div style="text-align:right;">
      <div class="section-title" style="margin-bottom:2px;">사료값</div>
      <div style="font-size:20px;font-weight:500;color:#0F6E56;" id="moneyVal">₩0</div>
      <div style="font-size:11px;color:var(--color-text-tertiary);" id="multiplierInfo">x1 배율</div>
    </div>
  </div>

  <div class="bar-wrap">
    <div class="bar-label"><span>💗 애정도</span><span id="lovePct">0%</span></div>
    <div class="bar-track"><div class="bar-fill love-fill" id="loveBar" style="width:0%"></div></div>
  </div>

  <div class="section-title">행동하기</div>
  <div class="btn-grid three">
    <button class="act-btn" onclick="feed()">
      <span class="btn-icon">🍗</span>밥 주기
      <div class="btn-cost">₩50 · 애정 +15</div>
    </button>
    <button class="act-btn" onclick="walk()">
      <span class="btn-icon">🦮</span>산책가기
      <div class="btn-cost">₩80 · 애정 +25</div>
    </button>
    <button class="act-btn" onclick="toy()">
      <span class="btn-icon">🧸</span>장난감 사기
      <div class="btn-cost">₩150 · 애정 +40</div>
    </button>
  </div>
  <div class="btn-grid">
    <button class="act-btn earn" onclick="work()">
      <span class="btn-icon">💼</span>사료값 벌기
      <div class="btn-cost">클릭당 +₩<span id="earnAmt">30</span></div>
    </button>
    <button class="act-btn blog-btn" onclick="blogPost()">
      <span class="btn-icon">✍️</span>글 올리기
      <div class="btn-cost">클릭당 +₩<span id="blogClickAmt">10</span></div>
    </button>
  </div>

  <div class="section-title">옹심이 파워블로그</div>
  <div class="blog-card" id="blogCard">
    <div class="blog-top">
      <div class="blog-title">📝 옹심이 일상 블로그 <span id="blogLvLabel" style="font-size:11px;color:#534AB7;font-weight:500;">Lv1</span></div>
      <div class="blog-auto">자동 +₩<span id="blogAutoAmt">0</span>/5초</div>
    </div>
    <div class="blog-progress-label">
      <span>글 올리기 진행도</span>
      <span id="blogProgressLabel">0 / 10회</span>
    </div>
    <div class="bar-track"><div class="bar-fill blog-fill" id="blogBar" style="width:0%"></div></div>
    <div class="blog-sub" id="blogSub">글을 10번 올리면 Lv2로 올라가요!</div>
    <div class="blog-timer-bar" id="blogTimerBarWrap" style="display:none"><div class="blog-timer-fill" id="blogTimerFill" style="width:100%"></div></div>
    <div class="power-blogger-banner" id="powerBloggerBanner">🏆 파워블로거 등극! 자동 수입 10배 달성! 🎉</div>
  </div>

  <button class="hosp-btn" id="hospBtn" onclick="goHospital()" disabled>
    🏥 병원 데려가기 (확률: <span id="hospBtnPct">0%</span>)
  </button>

  <div class="section-title">기록</div>
  <div class="visit-stat">
    <span style="font-size:20px;">🏥</span>
    <div>
      <div style="display:flex;align-items:baseline;gap:6px;">
        <div class="visit-stat-val" id="visitVal">0번</div>
        <div style="font-size:11px;color:var(--color-text-secondary);">총 병원 방문</div>
      </div>
      <div class="visit-stat-desc" id="visitDesc">병원 방문 횟수만큼 돈 배율 증가 (현재 x1)</div>
    </div>
  </div>

  <div class="section-title">최근 기록</div>
  <div class="log-box" id="logBox">게임을 시작했어요! 옹심이에게 관심을 줘보세요 🐾</div>
</div>

<script>
const SAVE_KEY = "ongsim_v7";
const BLOG_MAX_LV = 10;
const AUTO_INTERVAL = 5000;

const defaultState = { money: 0, love: 0, rebirth: 0, visits: 0, blogLv: 1, blogPosts: 0 };
let state = Object.assign({}, defaultState);

// ── 저장/불러오기 ──────────────────────────────────
function saveGame() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch(e) {}
}
function loadGame() {
  try {
    const saved = localStorage.getItem(SAVE_KEY);
    if (saved) state = Object.assign({}, defaultState, JSON.parse(saved));
  } catch(e) {}
}

// ── 계산 함수 ──────────────────────────────────────
function blogPostsNeeded(lv) { return lv * 10; }
function multiplier() { return state.rebirth + 1; }
function isPowerBlogger() { return state.blogLv >= BLOG_MAX_LV; }
// 파워블로거 달성 시 자동수입 10배
function blogAutoIncome() {
  if (isPowerBlogger()) return (BLOG_MAX_LV - 1) * 5 * multiplier() * 10;
  return (state.blogLv - 1) * 5 * multiplier();
}
function blogClickIncome() { return 10 * multiplier(); }
function hospChance() { return Math.min(100, Math.floor((state.love / 100) * 85 + state.rebirth * 5)); }

const moods = [[80,"꼬리치며 신나게 뛰어다니는 중! 🐾"],[60,"골골거리며 기지개 켜는 중..."],[40,"소파 위에서 졸고 있는 중..."],[20,"배고프다고 눈치 주는 중 👀"],[0,"집에서 뒹굴거리는 중..."]];
const emojis = [[80,"🐕"],[60,"🐶"],[40,"😴"],[20,"🥺"],[0,"🐶"]];
function getMood() { for (const [t,m] of moods) if (state.love >= t) return m; return moods[4][1]; }
function getEmoji() { for (const [t,e] of emojis) if (state.love >= t) return e; return "🐶"; }

// ── 자동수입 타이머 애니메이션 ──────────────────────
let autoTimerStart = Date.now();
function updateTimerBar() {
  const wrap = document.getElementById("blogTimerBarWrap");
  const fill = document.getElementById("blogTimerFill");
  if (blogAutoIncome() <= 0) { wrap.style.display = "none"; return; }
  wrap.style.display = "block";
  const elapsed = (Date.now() - autoTimerStart) % AUTO_INTERVAL;
  const pct = 100 - Math.round((elapsed / AUTO_INTERVAL) * 100);
  fill.style.width = pct + "%";
}
setInterval(updateTimerBar, 100);

// ── 렌더 ───────────────────────────────────────────
function render() {
  const love = Math.min(100, Math.round(state.love));
  const hosp = hospChance();
  document.getElementById("loveBar").style.width = love + "%";
  document.getElementById("lovePct").textContent = love + "%";
  document.getElementById("hospBtnPct").textContent = hosp + "%";
  document.getElementById("moneyVal").textContent = "₩" + state.money.toLocaleString();
  document.getElementById("multiplierInfo").textContent = "x" + multiplier() + " 배율";
  document.getElementById("visitVal").textContent = state.visits + "번";
  document.getElementById("visitDesc").textContent = "병원 방문 횟수만큼 돈 배율 증가 (현재 x" + multiplier() + ")";
  document.getElementById("dogMood").textContent = getMood();
  document.getElementById("dogEmoji").textContent = getEmoji();
  document.getElementById("hospBtn").disabled = hosp < 10;
  document.getElementById("earnAmt").textContent = 30 * multiplier();
  document.getElementById("blogClickAmt").textContent = blogClickIncome();
  document.getElementById("blogAutoAmt").textContent = blogAutoIncome();
  document.getElementById("blogLvLabel").textContent = "Lv" + state.blogLv;
  const b = document.getElementById("rebirthBadge");
  b.innerHTML = state.rebirth > 0 ? `<span class="rebirth-badge">✨ 환생 ${state.rebirth}회</span>` : "";

  const banner = document.getElementById("powerBloggerBanner");
  if (isPowerBlogger()) {
    banner.classList.add("show");
    document.getElementById("blogProgressLabel").textContent = "최대 레벨 달성! 🏆";
    document.getElementById("blogBar").style.width = "100%";
    document.getElementById("blogSub").textContent = "자동 +₩" + blogAutoIncome() + "/5초 (10배 보너스!)";
  } else {
    banner.classList.remove("show");
    const needed = blogPostsNeeded(state.blogLv);
    const progress = Math.min(state.blogPosts, needed);
    document.getElementById("blogProgressLabel").textContent = progress + " / " + needed + "회";
    document.getElementById("blogBar").style.width = Math.round((progress / needed) * 100) + "%";
    document.getElementById("blogSub").textContent = "글을 " + needed + "번 올리면 Lv" + (state.blogLv + 1) + " 달성! (자동수입 +₩5/5초)";
  }
}

// ── 로그 / 토스트 ──────────────────────────────────
function addLog(msg, important) {
  const box = document.getElementById("logBox");
  const el = document.createElement("div");
  el.className = "log-entry";
  if (important) el.style.fontWeight = "500";
  el.textContent = msg;
  box.insertBefore(el, box.firstChild);
  if (box.children.length > 5) box.removeChild(box.lastChild);
}
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1800);
}

// ── 행동 ───────────────────────────────────────────
function spendMoney(cost) {
  if (state.money < cost) { toast("사료값이 부족해요 💸"); return false; }
  state.money -= cost; return true;
}
function gainLove(amt, label) {
  state.love = Math.min(100, state.love + amt);
  const d = document.getElementById("dogEmoji");
  d.classList.remove("flash"); void d.offsetWidth; d.classList.add("flash");
  addLog(label); render(); saveGame();
}
function feed()  { if (spendMoney(50))  gainLove(15, "🍗 밥을 줬어요! 애정 +15"); }
function walk()  { if (spendMoney(80))  gainLove(25, "🦮 산책했어요! 애정 +25"); }
function toy()   { if (spendMoney(150)) gainLove(40, "🧸 장난감 샀어요! 애정 +40"); }
function work() {
  const earned = 30 * multiplier();
  state.money += earned;
  addLog("💼 사료값 벌었어요! ₩" + earned);
  toast("₩" + earned + " 획득!");
  render(); saveGame();
}
function blogPost() {
  const earned = blogClickIncome();
  state.money += earned;
  if (!isPowerBlogger()) {
    state.blogPosts++;
    const needed = blogPostsNeeded(state.blogLv);
    if (state.blogPosts >= needed) {
      state.blogPosts = 0;
      state.blogLv++;
      const card = document.getElementById("blogCard");
      card.classList.remove("lv-up-flash"); void card.offsetWidth; card.classList.add("lv-up-flash");
      if (isPowerBlogger()) {
        // 파워블로거 달성!
        addLog("🏆 파워블로거 등극!! 자동수입 10배 달성!", true);
        toast("🏆 파워블로거 달성!!!");
        spawnConfetti();
        const banner = document.getElementById("powerBloggerBanner");
        banner.classList.remove("show"); void banner.offsetWidth; banner.classList.add("show");
      } else {
        addLog("📈 블로그 Lv" + state.blogLv + " 달성! 자동수입 +₩5/5초 증가!", true);
        toast("🎉 파워블로그 Lv" + state.blogLv + " 달성!");
      }
    } else {
      addLog("✍️ 글 올렸어요! ₩" + earned + " 수익! (" + state.blogPosts + "/" + needed + "회)");
      toast("✍️ ₩" + earned + " 광고 수익!");
    }
  } else {
    addLog("✍️ 글 올렸어요! ₩" + earned + " 수익!");
    toast("✍️ ₩" + earned + " 광고 수익!");
  }
  render(); saveGame();
}
function goHospital() {
  const chance = hospChance();
  state.visits++;
  if (Math.random() * 100 < chance) {
    state.rebirth++;
    state.love = 0;
    state.money = Math.round(state.money * multiplier());
    // 환생 시 블로그 초기화
    state.blogLv = 1;
    state.blogPosts = 0;
    addLog("🎉 병원 성공! 환생 " + state.rebirth + "회 — 재화 x" + multiplier() + " 배율! 블로그 초기화", true);
    toast("🏥 병원 성공! ✨ 환생 " + state.rebirth + "회!");
    document.getElementById("dogEmoji").textContent = "😇";
    setTimeout(() => render(), 500);
  } else {
    state.love = Math.max(0, state.love - 20);
    addLog("😤 옹심이가 도망쳤어요! (확률 " + chance + "% 실패) 애정 -20");
    toast("옹심이: 거기는 절대 안 가!");
  }
  render(); saveGame();
}

// ── 파워블로거 달성 시 콘페티 ──────────────────────
function spawnConfetti() {
  const wrap = document.createElement("div");
  wrap.className = "confetti-wrap";
  document.body.appendChild(wrap);
  const colors = ["#534AB7","#D4537E","#1D9E75","#F5C842","#FF6B6B","#EEEDFE"];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement("div");
    p.className = "confetti-piece";
    p.style.left = Math.random() * 100 + "vw";
    p.style.top = "-10px";
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDelay = (Math.random() * 1.2) + "s";
    p.style.animationDuration = (1.5 + Math.random() * 1) + "s";
    p.style.width = (6 + Math.random() * 6) + "px";
    p.style.height = (6 + Math.random() * 6) + "px";
    wrap.appendChild(p);
  }
  setTimeout(() => wrap.remove(), 3500);
}

// ── 자동수입 인터벌 ────────────────────────────────
setInterval(() => {
  const auto = blogAutoIncome();
  if (auto > 0) {
    state.money += auto;
    autoTimerStart = Date.now();
    // 자동수입 펄스 애니메이션
    const el = document.querySelector(".blog-auto");
    if (el) { el.classList.remove("blog-auto-pulse"); void el.offsetWidth; el.classList.add("blog-auto-pulse"); }
    render(); saveGame();
  }
}, AUTO_INTERVAL);

setInterval(() => { state.love = Math.max(0, state.love - 0.8); render(); saveGame(); }, 3000);

// ── 초기화 ─────────────────────────────────────────
loadGame();
render();
if (state.visits === 0 && state.money === 0) {
  addLog("💡 글 올리기를 클릭할수록 블로그 레벨이 올라가요!");
} else {
  addLog("💾 저장된 게임을 불러왔어요!");
}
</script>
